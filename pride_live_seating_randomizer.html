
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRIDE | Рандомайзер рассадки</title>
<style>
:root{
  --bg:#0d0d0d;
  --panel:#171717;
  --panel2:#202020;
  --gold:#c9a44c;
  --gold2:#f0d77a;
  --text:#f5f5f5;
  --muted:#a9a9a9;
  --danger:#d9534f;
  --ok:#4caf50;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:radial-gradient(circle at top,#242424 0,#0d0d0d 45%,#050505 100%);
  color:var(--text);
  padding:24px;
}
.wrap{max-width:1200px;margin:0 auto}
.header{
  text-align:center;
  border:1px solid rgba(201,164,76,.45);
  border-radius:18px;
  padding:24px 16px;
  margin-bottom:18px;
  background:linear-gradient(180deg,rgba(201,164,76,.12),rgba(255,255,255,.03));
}
h1{margin:0;color:var(--gold2);letter-spacing:1.5px}
.sub{color:var(--muted);margin-top:8px}
.main{
  display:grid;
  grid-template-columns:360px 1fr;
  gap:18px;
}
.card{
  background:rgba(23,23,23,.96);
  border:1px solid rgba(201,164,76,.28);
  border-radius:16px;
  padding:18px;
}
label{display:block;margin-bottom:8px;color:var(--gold2);font-weight:bold}
input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #444;
  background:#0c0c0c;
  color:#fff;
  font-size:18px;
}
button{
  width:100%;
  padding:14px 16px;
  border:0;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
.primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#111}
.secondary{background:#2b2b2b;color:#fff;border:1px solid #555}
.danger{background:#3a1717;color:#fff;border:1px solid #8a2b2b}
.result{
  margin-top:16px;
  border-radius:14px;
  padding:20px;
  text-align:center;
  background:#0b0b0b;
  border:1px solid rgba(201,164,76,.35);
  min-height:170px;
}
.big{font-size:54px;color:var(--gold2);font-weight:bold;line-height:1.05}
.name{font-size:24px;margin-bottom:10px}
.meta{color:var(--muted);margin-top:10px}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}
.stat{
  background:#101010;
  border:1px solid #333;
  border-radius:10px;
  padding:12px;
  text-align:center;
}
.stat b{display:block;color:var(--gold2);font-size:22px}
.tables{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.table{
  background:var(--panel2);
  border:1px solid #3b3b3b;
  border-radius:14px;
  padding:12px;
}
.table h3{margin:0 0 10px;color:var(--gold2)}
.seat{
  display:flex;
  justify-content:space-between;
  gap:8px;
  border-bottom:1px solid #333;
  padding:6px 0;
  font-size:14px;
}
.seat:last-child{border-bottom:0}
.empty{color:#666}
.occupied{color:#fff}
.list{
  margin-top:14px;
  max-height:310px;
  overflow:auto;
  border-top:1px solid #333;
  padding-top:10px;
}
.row{
  display:grid;
  grid-template-columns:1fr 90px 90px 32px;
  gap:8px;
  align-items:center;
  padding:7px 0;
  border-bottom:1px solid #2e2e2e;
  font-size:14px;
}
.x{
  width:28px;height:28px;border-radius:6px;
  background:#351515;color:#fff;border:1px solid #753030;
  margin:0;padding:0;
}
.note{font-size:13px;color:var(--muted);line-height:1.4}
@media(max-width:900px){
  .main{grid-template-columns:1fr}
  .tables{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr}
}
@media print{
  body{background:#fff;color:#000}
  .card:first-child,.header button,.no-print{display:none!important}
  .main{display:block}
  .card{border:0}
  .table{break-inside:avoid;color:#000;background:#fff;border:1px solid #000}
  h1,h3{color:#000}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>PRIDE POKER CLUB</h1>
    <div class="sub">Рандомайзер рассадки: игрок пришёл → получил свободный случайный стол и место</div>
  </div>

  <div class="main">
    <div class="card">
      <label for="playerName">Имя игрока</label>
      <input id="playerName" placeholder="Например: Яна Х" autocomplete="off">
      <button class="primary" onclick="assignPlayer()">🎲 Выдать место</button>
      <button class="secondary" onclick="copyTelegram()">Скопировать список для Telegram</button>
      <button class="secondary" onclick="window.print()">Печать рассадки</button>
      <button class="danger" onclick="resetAll()">Сбросить турнир</button>

      <div class="result" id="result">
        <div class="meta">Введите имя игрока и нажмите «Выдать место»</div>
      </div>

      <div class="stats">
        <div class="stat"><b id="usedCount">0</b>Занято</div>
        <div class="stat"><b id="freeCount">60</b>Свободно</div>
        <div class="stat"><b>60</b>Всего мест</div>
      </div>

      <p class="note">
        Данные сохраняются в этом браузере. Даже если закрыть страницу, занятые места останутся занятыми.
      </p>
    </div>

    <div class="card">
      <h2 style="margin-top:0;color:var(--gold2)">Текущая рассадка</h2>
      <div class="tables" id="tables"></div>

      <div class="list" id="assignedList"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "pride_seating_6x10_v2";
let assignments = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(assignments));
}

function getAllSeats(){
  const seats = [];
  for(let table=1; table<=6; table++){
    for(let seat=1; seat<=10; seat++){
      seats.push({table, seat});
    }
  }
  return seats;
}

function getFreeSeats(){
  const used = new Set(assignments.map(a => a.table + "-" + a.seat));
  return getAllSeats().filter(s => !used.has(s.table + "-" + s.seat));
}

function assignPlayer(){
  const input = document.getElementById("playerName");
  const name = input.value.trim();

  if(!name){
    alert("Введите имя игрока");
    return;
  }

  const duplicate = assignments.find(a => a.name.toLowerCase() === name.toLowerCase());
  if(duplicate){
    const ok = confirm("Игрок с таким именем уже есть в рассадке: Стол " + duplicate.table + ", Место " + duplicate.seat + ". Всё равно добавить ещё раз?");
    if(!ok) return;
  }

  const freeSeats = getFreeSeats();
  if(freeSeats.length === 0){
    alert("Свободных мест больше нет");
    return;
  }

  const randomIndex = Math.floor(Math.random() * freeSeats.length);
  const chosen = freeSeats[randomIndex];

  const item = {
    name,
    table: chosen.table,
    seat: chosen.seat,
    time: new Date().toLocaleTimeString("ru-RU", {hour:"2-digit", minute:"2-digit"})
  };

  assignments.push(item);
  save();
  input.value = "";

  document.getElementById("result").innerHTML =
    '<div class="name">' + escapeHtml(name) + '</div>' +
    '<div class="big">Стол ' + item.table + '<br>Место ' + item.seat + '</div>' +
    '<div class="meta">Место закреплено. Повторно оно уже не выпадет.</div>';

  render();
}

function removePlayer(index){
  if(confirm("Удалить игрока из рассадки и освободить его место?")){
    assignments.splice(index,1);
    save();
    render();
  }
}

function resetAll(){
  if(confirm("Точно сбросить всю рассадку турнира? Все места снова станут свободными.")){
    assignments = [];
    save();
    document.getElementById("result").innerHTML = '<div class="meta">Рассадка сброшена</div>';
    render();
  }
}

function render(){
  const tables = document.getElementById("tables");
  tables.innerHTML = "";

  for(let t=1; t<=6; t++){
    const div = document.createElement("div");
    div.className = "table";
    let html = "<h3>Стол " + t + "</h3>";
    for(let s=1; s<=10; s++){
      const found = assignments.find(a => a.table === t && a.seat === s);
      html += '<div class="seat ' + (found ? "occupied" : "empty") + '">';
      html += '<span>Место ' + s + '</span>';
      html += '<span>' + (found ? escapeHtml(found.name) : "свободно") + '</span>';
      html += '</div>';
    }
    div.innerHTML = html;
    tables.appendChild(div);
  }

  document.getElementById("usedCount").textContent = assignments.length;
  document.getElementById("freeCount").textContent = 60 - assignments.length;

  const list = document.getElementById("assignedList");
  if(assignments.length === 0){
    list.innerHTML = '<div class="meta">Пока нет выданных мест</div>';
  } else {
    let html = "";
    assignments.forEach((a, i) => {
      html += '<div class="row">';
      html += '<div>' + escapeHtml(a.name) + '</div>';
      html += '<div>Стол ' + a.table + '</div>';
      html += '<div>Место ' + a.seat + '</div>';
      html += '<button class="x no-print" onclick="removePlayer(' + i + ')">×</button>';
      html += '</div>';
    });
    list.innerHTML = html;
  }
}

function copyTelegram(){
  if(assignments.length === 0){
    alert("Пока нет рассадки");
    return;
  }

  const sorted = [...assignments].sort((a,b)=>a.table-b.table || a.seat-b.seat);
  let text = "🦁 PRIDE | Рассадка\\n\\n";
  for(let t=1; t<=6; t++){
    const players = sorted.filter(a=>a.table===t);
    if(players.length){
      text += "Стол " + t + "\\n";
      players.forEach(a=>{
        text += "Место " + a.seat + " — " + a.name + "\\n";
      });
      text += "\\n";
    }
  }

  navigator.clipboard.writeText(text).then(
    ()=>alert("Список скопирован"),
    ()=>alert("Не удалось скопировать. Попробуйте выделить вручную.")
  );
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, function(m){
    return ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    })[m];
  });
}

document.getElementById("playerName").addEventListener("keydown", function(e){
  if(e.key === "Enter") assignPlayer();
});

render();
</script>
</body>
</html>
